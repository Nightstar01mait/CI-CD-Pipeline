name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*' # Trigger on version tags
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/app # Assuming 'app' as the main service

jobs:
  # -------------------------------------------------------------
  # Stage 1: Continuous Integration (Lint & Test)
  # -------------------------------------------------------------
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment (e.g., Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || echo "No package.json found, skipping npm ci for template"

      - name: Run Linter
        run: npm run lint --if-present || echo "No lint script found"

      - name: Run Tests
        run: npm run test --if-present || echo "No test script found"

  # -------------------------------------------------------------
  # Stage 2: Continuous Delivery / Build Docker Image
  # -------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    needs: ci
    # Only run build-and-push on main branch push or tag (not on PRs)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Or DOCKER_PASSWORD for DockerHub

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long # e.g., sha-ad132f5...
            type=ref,event=branch # e.g., main
            type=semver,pattern={{version}} # e.g., v1.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

