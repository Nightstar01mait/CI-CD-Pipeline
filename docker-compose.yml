version: '3.8'

services:
  app:
    # Use the image tag generated by the CI/CD pipeline
    image: ${GHCR_IMAGE:-ghcr.io/yourusername/reponame/app:latest}
    container_name: production-app
    restart: unless-stopped
    ports:
      - "80:8080" # Map host port to container port
    environment:
      - NODE_ENV=production
      # - DATABASE_URL=${DATABASE_URL} # Add secrets/env vars here
    # volumes:
      # - ./data:/app/data # For persistent data storage if needed
    networks:
      - app-network

# Define networks if connecting multiple services (e.g., app + db)
networks:
  app-network:
    driver: bridge
